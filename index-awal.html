<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joki Tembok CoC - Kalkulator Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --accent: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: var(--primary);
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        h2 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        /* Input Area */
        .masukan {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .inputan {
            width: 100%;
            height: 150px;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid var(--border);
            font-family: monospace;
            font-size: 13px;
            background: #f1f5f9;
            transition: all 0.3s ease;
            resize: none;
        }

        .inputan:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .tombol {
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .tombol:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        /* Result Area */
        .tampilkanDataTembok {
            display: grid;
            gap: 20px;
        }

        .tembok {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #f8fafc;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .kiri, .kanan {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .kiri h1, .kanan h1 {
            font-size: 1.2rem;
            margin: 0;
            color: var(--text-main);
        }

        .gambar {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 10px;
            padding: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .gambar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .icon-upgrade {
            width: 30px;
            opacity: 0.5;
        }

        /* Price Section */
        .tampilkanHarga {
            margin-top: 30px;
            padding: 25px;
            background: #eff6ff;
            border-radius: 20px;
            border: 2px dashed var(--primary);
            text-align: center;
        }

        .tampilkanHarga h1 {
            font-size: 2.5rem;
            color: #047857; /* Green for Price */
            margin: 15px 0;
        }

        .gambarTownhall {
            width: 120px;
            height: auto;
            margin: 0 auto;
            display: block;
        }

        .keterangan {
            text-align: left;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(37, 99, 235, 0.1);
        }

        .keterangan span {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .keterangan div {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
            background: white;
            padding: 10px;
            border-radius: 8px;
        }

        .keterangan img {
            height: 40px !important;
            width: auto !important;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>Joki Tembok CoC</h1>
        <p class="subtitle">Kalkulasi biaya upgrade tembok otomatis via JSON</p>

        <h2>Tempel Data JSON Akun</h2>
        <div class="masukan">
            <textarea class="inputan" placeholder="Masukkan data json di sini...">{"tag":"#Y9VQUPYUP","buildings":[{"data":1000001,"lvl":17},{"data":1000010,"lvl":16,"cnt":85},{"data":1000010,"lvl":17,"cnt":240}]}</textarea>
            <button class="tombol">HITUNG BIAYA SEKARANG</button>
        </div>

        <div class="tampilkanDataTembok">
            </div>
    </div>

    <script>
        const tombol = document.querySelector('.tombol');
        
        tombol.addEventListener('click', tampilkanData);

        // Data harga fallback jika fetch gagal
        const hargaDefault = [
            {"lvl": 1, "harga": 100}, {"lvl": 2, "harga": 100}, {"lvl": 3, "harga": 100},
            {"lvl": 4, "harga": 100}, {"lvl": 5, "harga": 100}, {"lvl": 6, "harga": 100},
            {"lvl": 7, "harga": 100}, {"lvl": 8, "harga": 100}, {"lvl": 9, "harga": 100},
            {"lvl": 10, "harga": 100}, {"lvl": 11, "harga": 100}, {"lvl": 12, "harga": 100},
            {"lvl": 13, "harga": 100}, {"lvl": 14, "harga": 100}, {"lvl": 15, "harga": 150},
            {"lvl": 16, "harga": 200}, {"lvl": 17, "harga": 300}, {"lvl": 18, "harga": 500},
            {"lvl": 19, "harga": 1000}
        ];

        async function tampilkanData(){
            const inputanDataJson = document.querySelector('.inputan');
            if(!inputanDataJson.value) return;

            const dataJson = JSON.parse(inputanDataJson.value);
            let townhall = 1;
            let wallMax = 1;

            // Cari level Townhall
            const thData = dataJson.buildings.find(e => e.data == 1000001);
            if(thData) {
                townhall = thData.lvl;
                wallMax = townhall > 10 ? townhall + 1 : townhall;
            }

            // Filter & Map data tembok
            const dataTembokSekarang = dataJson.buildings
                .filter(e => e.data == 1000010)
                .map(e => ({ "lvl": e.lvl, "cnt": e.cnt }));

            // Generate HTML untuk list tembok
            const dataHtml = dataTembokSekarang.map(element => `
                <div class="tembok">
                    <div class="kiri">
                        <div class="gambar">
                            <img src="./gambarTembok/gambar_hd_${element.lvl}.jpg" onerror="this.src='https://via.placeholder.com/60?text=Wall+${element.lvl}'">
                        </div>
                        <h1>x ${element.cnt}</h1>
                    </div>
                    <img src="./icon/upgrade.webp" class="icon-upgrade" onerror="this.style.display='none'">
                    <div class="kanan">
                        <h1>Ke Level ${wallMax}</h1>
                        <div class="gambar">
                            <img src="./gambarTembok/gambar_hd_${wallMax}.jpg" onerror="this.src='https://via.placeholder.com/60?text=Max'">
                        </div>
                    </div>
                </div>
            `).join("");

            let dataHarga = hargaDefault;
            try {
                const response = await fetch("./harga.json");
                if(response.ok) dataHarga = await response.json();
            } catch (e) { console.log("Using default prices"); }

            const hasilKalkulasi = hitungHarga(dataHarga, wallMax, dataTembokSekarang, townhall);
            document.querySelector('.tampilkanDataTembok').innerHTML = dataHtml + hasilKalkulasi;
        }

        function hitungHarga(daftarHarga, wallMax, dataTembok, townhall){
            let totalHarga = 0;
            let keterangan = "";

            dataTembok.forEach((ini, i) => {
                keterangan += `<span><strong>Kelompok Tembok #${i+1} (${ini.cnt} unit)</strong></span>`;
                let levelSkrg = parseInt(ini.lvl);
                
                if(levelSkrg >= wallMax) {
                    keterangan += `<span>Sudah Level Max</span>`;
                } else {
                    let logUpgrade = `<div class="step-upgrade">`;
                    for(let l = levelSkrg + 1; l <= wallMax; l++) {
                        let dataH = daftarHarga.find(item => item.lvl === l) || {harga: 0};
                        let subTotal = dataH.harga * ini.cnt;
                        totalHarga += subTotal;
                        
                        logUpgrade += `
                            <img src="./gambarTembok/gambar_hd_${l-1}.jpg" onerror="this.src='https://via.placeholder.com/40'">
                            <span>➔</span>
                            <img src="./gambarTembok/gambar_hd_${l}.jpg" onerror="this.src='https://via.placeholder.com/40'">
                            <span style="font-size:11px"> (Lvl ${l}: Rp ${subTotal.toLocaleString('id-ID')})</span>
                        `;
                    }
                    logUpgrade += `</div>`;
                    keterangan += logUpgrade;
                }
            });

            return `
                <div class="tampilkanHarga">
                    <img class="gambarTownhall" src="./gambarTownhall/gambar_hd_${townhall}.jpg" onerror="this.src='https://via.placeholder.com/120?text=TH+${townhall}'">
                    <p style="margin-top:10px; color:var(--text-muted)">Estimasi Total Biaya Joki:</p>
                    <h1>Rp ${totalHarga.toLocaleString('id-ID')}</h1>
                    <div class="keterangan">
                        <h2>Detail Pengerjaan</h2>
                        ${keterangan}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
